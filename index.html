<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Report Tool - Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 p-5">
    <div class="max-w-6xl mx-auto bg-white shadow-lg rounded-xl p-6">
        <h1 class="text-3xl font-bold text-center text-red-500 mb-6">🎬 TIKTOK REPORT TOOL</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-blue-500 text-white p-4 rounded-lg shadow">
                <p class="text-sm uppercase">Tổng View</p>
                <p id="totalViews" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-pink-500 text-white p-4 rounded-lg shadow">
                <p class="text-sm uppercase">Tổng Tim ❤️</p>
                <p id="totalLikes" class="text-2xl font-bold">0</p>
            </div>
            </div>

        <textarea id="inputLinks" class="w-full h-40 p-4 border-2 border-gray-200 rounded-lg focus:border-red-400 outline-none transition" placeholder="Dán mỗi dòng 1 link TikTok vào đây..."></textarea>
        
        <div class="flex flex-wrap gap-3 mt-4">
            <button onclick="startScanning()" id="btnScan" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-6 rounded-lg shadow transition">🚀 Quét Data Ngay</button>
            <button onclick="clearAll()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg shadow transition">🧹 Xoá Sạch</button>
            <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow transition">📥 Xuất Excel</button>
        </div>

        <div class="mt-8 overflow-x-auto">
            <table class="w-full text-left border-collapse" id="resultTable">
                <thead>
                    <tr class="bg-gray-800 text-white">
                        <th class="p-3 border">#</th>
                        <th class="p-3 border">Ảnh</th>
                        <th class="p-3 border">Caption</th>
                        <th class="p-3 border">View</th>
                        <th class="p-3 border">Like</th>
                        <th class="p-3 border">Cmt</th>
                        <th class="p-3 border">Link</th>
                        <th class="p-3 border">Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
      async function startScanning() {
            const textArea = document.getElementById('inputLinks');
            const links = textArea.value.split('\n').filter(l => l.trim() !== '');
            const tableBody = document.getElementById('tableBody');
            const btn = document.getElementById('btnScan');
            
            // Lấy 2 cái ô tổng để chuẩn bị nhảy số
            const totalViewsElem = document.getElementById('totalViews');
            const totalLikesElem = document.getElementById('totalLikes');
            
            let totalViews = 0;
            let totalLikes = 0;

            if(links.length === 0) return alert('Dán link vào đã bạn ơi!');

            btn.disabled = true;
            btn.innerText = "Đang quét...";
            tableBody.innerHTML = ''; 

            for (let i = 0; i < links.length; i++) {
                const row = tableBody.insertRow();
                row.innerHTML = `<td class="p-3 border">${i+1}</td><td class="p-3 border text-center" colspan="7">Đang lấy dữ liệu...</td>`;
                
                try {
                    const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(links[i])}`);
                    const res = await response.json();
                    const data = res.data;

                    // Cập nhật biến tổng
                    totalViews += data.play_count;
                    totalLikes += data.digg_count;

                    // Cho số nhảy lên giao diện luôn
                    totalViewsElem.innerText = totalViews.toLocaleString();
                    totalLikesElem.innerText = totalLikes.toLocaleString();

                    row.innerHTML = `
                        <td class="p-3 border">${i+1}</td>
                        <td class="p-3 border"><img src="${data.cover}" class="w-12 h-12 object-cover rounded mx-auto"></td>
                        <td class="p-3 border text-sm">${data.title.substring(0, 50)}...</td>
                        <td class="p-3 border font-bold text-blue-600">${data.play_count.toLocaleString()}</td>
                        <td class="p-3 border font-bold text-pink-600">${data.digg_count.toLocaleString()}</td>
                        <td class="p-3 border">${data.comment_count.toLocaleString()}</td>
                        <td class="p-3 border"><a href="${links[i]}" target="_blank" class="text-blue-500 underline">Xem</a></td>
                        <td class="p-3 border"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">Xong</span></td>
                    `;
                } catch (error) {
                    row.innerHTML = `<td class="p-3 border">${i+1}</td><td class="p-3 border text-red-500 text-center" colspan="7">Lỗi link này hoặc API bận</td>`;
                }
            }
            btn.disabled = false;
            btn.innerText = "🚀 Quét Data Ngay";
        }
