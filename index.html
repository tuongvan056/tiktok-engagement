<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Report - Custom By Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-10">
    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-2xl p-6 border border-gray-100">
        <h1 class="text-3xl font-extrabold text-center text-red-600 mb-8 flex items-center justify-center gap-2">
            🎬 TIKTOK REPORT TOOL
        </h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-6 rounded-xl shadow-lg transform transition hover:scale-105">
                <p class="text-sm font-semibold uppercase opacity-80">Tổng View</p>
                <p id="totalViews" class="text-4xl font-black mt-1">0</p>
            </div>
            <div class="bg-gradient-to-br from-pink-500 to-pink-600 text-white p-6 rounded-xl shadow-lg transform transition hover:scale-105">
                <p class="text-sm font-semibold uppercase opacity-80">Tổng Tim ❤️</p>
                <p id="totalLikes" class="text-4xl font-black mt-1">0</p>
            </div>
        </div>

        <div class="space-y-4">
            <label class="block text-gray-700 font-bold text-lg text-center">Dán danh sách Link Video (mỗi dòng 1 link):</label>
            <textarea id="inputLinks" class="w-full h-48 p-4 border-2 border-gray-200 rounded-xl focus:border-red-500 focus:ring-2 focus:ring-red-200 outline-none transition text-sm shadow-inner" placeholder="https://www.tiktok.com/@user/video/123456789..."></textarea>
            
            <div class="flex flex-wrap justify-center gap-4">
                <button onclick="startScanning()" id="btnScan" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all active:scale-95 flex items-center gap-2">
                    🚀 Quét Data Ngay
                </button>
                <button onclick="clearAll()" class="bg-slate-500 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all active:scale-95">
                    🧹 Xoá Sạch
                </button>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all active:scale-95 flex items-center gap-2">
                    📥 Xuất Excel
                </button>
            </div>
        </div>

        <div class="mt-10 overflow-x-auto rounded-xl border border-gray-200 shadow-sm">
            <table class="w-full text-left border-collapse" id="resultTable">
                <thead>
                    <tr class="bg-slate-800 text-white text-sm uppercase">
                        <th class="p-4 border-b">#</th>
                        <th class="p-4 border-b text-center">Ảnh</th>
                        <th class="p-4 border-b">Caption</th>
                        <th class="p-4 border-b text-center">View</th>
                        <th class="p-4 border-b text-center">Like</th>
                        <th class="p-4 border-b text-center">Cmt</th>
                        <th class="p-4 border-b text-center">Link</th>
                        <th class="p-4 border-b text-center">Trạng Thái</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function startScanning() {
            const textArea = document.getElementById('inputLinks');
            const links = textArea.value.split('\n').map(l => l.trim()).filter(l => l !== '');
            const tableBody = document.getElementById('tableBody');
            const btn = document.getElementById('btnScan');
            const totalViewsElem = document.getElementById('totalViews');
            const totalLikesElem = document.getElementById('totalLikes');
            
            if(links.length === 0) return alert('Hãy dán ít nhất 1 link TikTok!');

            // Reset dữ liệu ban đầu
            btn.disabled = true;
            btn.classList.add('opacity-50');
            btn.innerText = "⏳ Đang quét...";
            tableBody.innerHTML = '';
            let totalViews = 0;
            let totalLikes = 0;
            totalViewsElem.innerText = "0";
            totalLikesElem.innerText = "0";

            for (let i = 0; i < links.length; i++) {
                const row = tableBody.insertRow();
                row.className = "hover:bg-gray-50 transition";
                row.innerHTML = `<td class="p-4 border-b text-center font-bold">${i+1}</td><td class="p-4 border-b text-center text-gray-400" colspan="7 italic">Đang phân tích link...</td>`;
                
                try {
                    // Gọi API Tikwm
                    const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(links[i])}`);
                    const result = await response.json();
                    
                    if (result.code === 0 && result.data) {
                        const d = result.data;
                        
                        // Cộng dồn tổng
                        totalViews += d.play_count;
                        totalLikes += d.digg_count;
                        
                        // Cập nhật số lên bảng thống kê ngay lập tức
                        totalViewsElem.innerText = totalViews.toLocaleString();
                        totalLikesElem.innerText = totalLikes.toLocaleString();

                        row.innerHTML = `
                            <td class="p-4 border-b text-center font-bold text-gray-500">${i+1}</td>
                            <td class="p-4 border-b text-center"><img src="${d.cover}" class="w-14 h-14 object-cover rounded-lg mx-auto shadow-sm border border-gray-200"></td>
                            <td class="p-4 border-b text-
