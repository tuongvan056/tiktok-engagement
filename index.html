<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Report Tool - Version 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-6xl mx-auto bg-white shadow-xl rounded-xl p-6">
        <h1 class="text-3xl font-bold text-center text-red-500 mb-6">🎬 TIKTOK REPORT TOOL</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-center">
            <div class="bg-blue-500 text-white p-4 rounded-lg shadow">
                <p class="text-sm uppercase font-semibold">Tổng View</p>
                <p id="totalViews" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-pink-500 text-white p-4 rounded-lg shadow">
                <p class="text-sm uppercase font-semibold">Tổng Tim ❤️</p>
                <p id="totalLikes" class="text-3xl font-bold">0</p>
            </div>
        </div>

        <textarea id="inputLinks" class="w-full h-32 p-3 border-2 rounded-lg mb-4" placeholder="Dán link TikTok vào đây (mỗi dòng 1 link)..."></textarea>
        
        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="startScanning()" id="btnScan" class="bg-red-500 text-white px-6 py-2 rounded-lg font-bold">🚀 Quét Data Ngay</button>
            <button onclick="clearAll()" class="bg-gray-500 text-white px-6 py-2 rounded-lg font-bold">🧹 Xoá Sạch</button>
            <button onclick="exportToExcel()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold">📥 Xuất Excel</button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse border" id="resultTable">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="p-3 border">#</th>
                        <th class="p-3 border">Ảnh</th>
                        <th class="p-3 border">Caption</th>
                        <th class="p-3 border">View</th>
                        <th class="p-3 border">Like</th>
                        <th class="p-3 border">Cmt</th>
                        <th class="p-3 border">Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function startScanning() {
            const links = document.getElementById('inputLinks').value.split('\n').map(l => l.trim()).filter(l => l !== '');
            const tableBody = document.getElementById('tableBody');
            const btn = document.getElementById('btnScan');
            const viewTxt = document.getElementById('totalViews');
            const likeTxt = document.getElementById('totalLikes');

            if(links.length === 0) return alert("Vui lòng dán link!");

            btn.disabled = true;
            btn.innerText = "Đang quét...";
            tableBody.innerHTML = "";
            let tView = 0, tLike = 0;

            for(let i=0; i<links.length; i++) {
                let row = tableBody.insertRow();
                row.innerHTML = `<td class="p-3 border text-center">${i+1}</td><td colspan="6" class="p-3 border text-center text-blue-500">Đang lấy dữ liệu...</td>`;
                
                try {
                    // Thử dùng API 1: Tikwm
                    let res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(links[i])}`);
                    let json = await res.json();
                    
                    if(json.code === 0 && json.data) {
                        let d = json.data;
                        tView += d.play_count;
                        tLike += d.digg_count;
                        viewTxt.innerText = tView.toLocaleString();
                        likeTxt.innerText = tLike.toLocaleString();

                        row.innerHTML = `
                            <td class="p-3 border text-center">${i+1}</td>
                            <td class="p-3 border text-center"><img src="${d.cover}" class="w-12 h-12 mx-auto rounded"></td>
                            <td class="p-3 border text-sm">${d.title.substring(0,40)}...</td>
                            <td class="p-3 border text-center font-bold text-blue-600">${d.play_count.toLocaleString()}</td>
                            <td class="p-3 border text-center font-bold text-pink-600">${d.digg_count.toLocaleString()}</td>
                            <td class="p-3 border text-center">${d.comment_count.toLocaleString()}</td>
                            <td class="p-3 border text-center text-green-500 font-bold text-xs uppercase">Xong</td>
                        `;
                    } else {
                        throw new Error("API Error");
                    }
                } catch (e) {
                    row.innerHTML = `<td class="p-3 border text-center">${i+1}</td><td colspan="6" class="p-3 border text-center text-red-500 font-semibold italic">Link lỗi hoặc API đang bận. Vui lòng thử lại sau.</td>`;
                }
            }
            btn.disabled = false;
            btn.innerText = "🚀 Quét Data Ngay";
        }

        function exportToExcel() {
            XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('resultTable')), 'Bao-Cao-TikTok.xlsx');
        }

        function clearAll() {
            document.getElementById('inputLinks').value = "";
            document.getElementById('tableBody').innerHTML = "";
            document.getElementById('totalViews').innerText = "0";
            document.getElementById('totalLikes').innerText = "0";
        }
    </script>
</body>
</html>
