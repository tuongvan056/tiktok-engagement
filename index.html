<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Channel Analytics - Air Time Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 p-2 md:p-6">
    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-2xl p-4 md:p-8 border border-gray-200">
        <h1 class="text-2xl md:text-4xl font-black text-center text-red-600 mb-8 uppercase tracking-tighter">
            📊 TikTok Channel Analytics
        </h1>
        
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-8 text-center">
            <div class="bg-blue-600 text-white p-4 rounded-xl shadow-lg">
                <p class="text-[10px] uppercase font-bold opacity-80">Tổng View</p>
                <p id="totalViews" class="text-xl md:text-2xl font-black">0</p>
            </div>
            <div class="bg-pink-500 text-white p-4 rounded-xl shadow-lg">
                <p class="text-[10px] uppercase font-bold opacity-80">Tổng Like</p>
                <p id="totalLikes" class="text-xl md:text-2xl font-black">0</p>
            </div>
            <div class="bg-indigo-500 text-white p-4 rounded-xl shadow-lg">
                <p class="text-[10px] uppercase font-bold opacity-80">Tổng Cmt</p>
                <p id="totalCmts" class="text-xl md:text-2xl font-black">0</p>
            </div>
            <div class="bg-emerald-500 text-white p-4 rounded-xl shadow-lg">
                <p class="text-[10px] uppercase font-bold opacity-80">Tổng Share</p>
                <p id="totalShares" class="text-xl md:text-2xl font-black">0</p>
            </div>
            <div class="bg-orange-500 text-white p-4 rounded-xl shadow-lg">
                <p class="text-[10px] uppercase font-bold opacity-80">Tổng Save</p>
                <p id="totalSaves" class="text-xl md:text-2xl font-black">0</p>
            </div>
        </div>

        <div class="space-y-4 max-w-xl mx-auto mb-8">
            <label class="block text-gray-700 font-bold text-center">Nhập Username kênh TikTok cần quét:</label>
            <div class="flex gap-2">
                <input id="inputUser" type="text" class="flex-1 p-3 border-2 border-gray-200 rounded-xl focus:border-red-500 outline-none transition text-center font-bold text-lg" placeholder="Ví dụ: jollibee_vietnam">
            </div>
            
            <div class="flex justify-center gap-4">
                <button onclick="fetchChannelData()" id="btnScan" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-10 rounded-full shadow-xl transition active:scale-95">
                    🔥 Quét Kênh Ngay
                </button>
                <button onclick="exportToExcel()" class="bg-green-700 hover:bg-green-800 text-white font-bold py-3 px-8 rounded-full shadow-lg transition">
                    📥 Xuất Excel
                </button>
            </div>
        </div>

        <div class="overflow-x-auto rounded-xl border border-gray-200 shadow-md">
            <table class="w-full border-collapse" id="resultTable">
                <thead class="bg-slate-900 text-white text-[10px] md:text-xs uppercase">
                    <tr>
                        <th class="p-4 border">#</th>
                        <th class="p-4 border text-center">Ảnh</th>
                        <th class="p-4 border text-left">Caption</th>
                        <th class="p-4 border text-center text-amber-400">Thời Gian Air</th>
                        <th class="p-4 border text-center">View</th>
                        <th class="p-4 border text-center text-pink-400">Like</th>
                        <th class="p-4 border text-center text-indigo-400">Cmt</th>
                        <th class="p-4 border text-center text-emerald-400">Share</th>
                        <th class="p-4 border text-center text-orange-400">Save</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-gray-700 font-semibold text-xs md:text-sm italic">
                    <tr>
                        <td colspan="9" class="p-4 text-center text-gray-400">Nhập tên kênh để bắt đầu dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Hàm tự động đổi Timestamp thành định dạng YYYY-MM-DD HH:mm
        def formatAirTime(timestamp) {
            if (!timestamp) return "N/A";
            const date = new Date(timestamp * 1000); // Đổi giây sang mili giây
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        async function fetchChannelData() {
            let user = document.getElementById('inputUser').value.trim();
            const tableBody = document.getElementById('tableBody');
            const btn = document.getElementById('btnScan');
            
            const vTxt = document.getElementById('totalViews');
            const lTxt = document.getElementById('totalLikes');
            const cTxt = document.getElementById('totalCmts');
            const sTxt = document.getElementById('totalShares');
            const saTxt = document.getElementById('totalSaves');

            if(!user) return alert("Vui lòng nhập ID kênh!");
            
            if(user.startsWith('@')) {
                user = user.substring(1);
            }

            btn.disabled = true;
            btn.innerText = "⏳ Đang tải kênh...";
            tableBody.innerHTML = `<tr><td colspan="9" class="p-4 text-center text-blue-500 animate-pulse font-bold">Đang cào dữ liệu loạt video mới nhất...</td></tr>`;
            
            let tV = 0, tL = 0, tC = 0, tS = 0, tSa = 0;
            vTxt.innerText = "0"; lTxt.innerText = "0"; cTxt.innerText = "0"; sTxt.innerText = "0"; saTxt.innerText = "0";

            try {
                let res = await fetch(`https://www.tikwm.com/api/user/posts?unique_id=${encodeURIComponent(user)}&count=30`);
                let json = await res.json();
                
                if(json.code === 0 && json.data && json.data.videos) {
                    const videos = json.data.videos;
                    tableBody.innerHTML = ""; 

                    videos.forEach((v, index) => {
                        tV += v.play_count; 
                        tL += v.digg_count; 
                        tC += v.comment_count; 
                        tS += v.share_count; 
                        tSa += v.collect_count;

                        // Chuyển đổi thời gian air bài từ dữ liệu gốc (v.create_time)
                        const formattedTime = formatAirTime(v.create_time);

                        const row = tableBody.insertRow();
                        row.className = "border-b hover:bg-slate-50 transition font-normal text-sm";
                        row.innerHTML = `
                            <td class="p-4 text-center border font-bold text-gray-400">${index + 1}</td>
                            <td class="p-4 border text-center"><img src="${v.cover}" class="w-12 h-12 mx-auto rounded-lg shadow border"></td>
                            <td class="p-4 border text-[11px] max-w-xs truncate" title="${v.title}">${v.title || 'Không có caption'}</td>
                            <td class="p-4 border text-center font-bold text-amber-700 whitespace-nowrap">${formattedTime}</td>
                            <td class="p-4 border text-center text-blue-700 font-black">${v.play_count.toLocaleString()}</td>
                            <td class="p-4 border text-center text-pink-600 font-black">${v.digg_count.toLocaleString()}</td>
                            <td class="p-4 border text-center text-indigo-600">${v.comment_count.toLocaleString()}</td>
                            <td class="p-4 border text-center text-emerald-600">${v.share_count.toLocaleString()}</td>
                            <td class="p-4 border text-center text-orange-600">${v.collect_count.toLocaleString()}</td>
                        `;
                    });

                    vTxt.innerText = tV.toLocaleString();
                    lTxt.innerText = tL.toLocaleString();
                    cTxt.innerText = tC.toLocaleString();
                    sTxt.innerText = tS.toLocaleString();
                    saTxt.innerText = tSa.toLocaleString();

                } else {
                    tableBody.innerHTML = `<tr><td colspan="9" class="p-4 text-center text-red-500 font-bold">Không tìm thấy kênh này hoặc kênh để chế độ riêng tư.</td></tr>`;
                }
            } catch (e) {
                tableBody.innerHTML = `<tr><td colspan="9" class="p-4 text-center text-red-500 font-bold">Lỗi kết nối API. Hãy thử lại sau!</td></tr>`;
            }
            
            btn.disabled = false;
            btn.innerText = "🔥 Quét Kênh Ngay";
        }

        function exportToExcel() {
            const table = document.getElementById('resultTable');
            const wb = XLSX.utils.table_to_book(table);
            const channelName = document.getElementById('inputUser').value || 'TikTok';
            XLSX.writeFile(wb, `Bao_Cao_Kenh_${channelName}.xlsx`);
        }
    </script>
</body>
</html>
